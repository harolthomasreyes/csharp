services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_DB: dapr_outbox
      POSTGRES_USER: dapr
      POSTGRES_PASSWORD: dapr_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - dapr-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dapr"]
      interval: 10s
      timeout: 5s
      retries: 5

  pulsar:
    image: apachepulsar/pulsar:3.3.0
    container_name: pulsar
    ports:
      - "6650:6650"
      - "8080:8080"
    volumes:
      - pulsar-data:/pulsar/data
    networks:
      - dapr-network
    command: bin/pulsar standalone -nfw -nss

  order-service:
    build:
      context: ./services/OrderService
      dockerfile: Dockerfile
    container_name: order-service
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=dapr_outbox
      - POSTGRES_USERNAME=dapr
      - POSTGRES_PASSWORD=dapr_secret
      - DAPR_LOG_LEVEL=debug
    ports:
      - "5000:5000"
      - "5002:5002"
    volumes:
      - ./components:/components
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dapr-network
    healthcheck:
      test: ["CMD", "timeout", "2", "bash", "-c", "echo >/dev/tcp/localhost/5000"]
      interval: 10s
      timeout: 5s
      retries: 3
    command: dotnet OrderService.dll

  notification-service:
    build:
      context: ./services/NotificationService
      dockerfile: Dockerfile
    container_name: notification-service
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=dapr_outbox
      - POSTGRES_USERNAME=dapr
      - POSTGRES_PASSWORD=dapr_secret
      - DAPR_LOG_LEVEL=debug
    ports:
      - "5001:5001"
      - "5003:5003"
    volumes:
      - ./components:/components
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dapr-network
    healthcheck:
      test: ["CMD", "timeout", "2", "bash", "-c", "echo >/dev/tcp/localhost/5001"]
      interval: 10s
      timeout: 5s
      retries: 3
    command: dotnet NotificationService.dll

  dapr-dashboard:
    image: daprio/dashboard:latest
    container_name: dapr-dashboard
    ports:
      - "8081:8081"
    depends_on:
      - order-service
      - notification-service
    networks:
      - dapr-network

volumes:
  postgres-data:
  pulsar-data:

networks:
  dapr-network:
    driver: bridge
