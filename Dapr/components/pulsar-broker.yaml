apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: pubsub
spec:
  type: pubsub.pulsar
  version: v1
  metadata:
  - name: brokers
    value: "pulsar:6650"
  - name: authType
    value: "none"
  - name: consumerID
    value: "dapr-app"
  - name: namespace
    value: "public/default"
  - name: tenant
    value: "public"
