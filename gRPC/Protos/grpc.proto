syntax = "proto3";

option csharp_namespace = "GrpcShared";

package grpcstreaming;

service DataGeneratorService {
  rpc GenerateRecords (GenerateRequest) returns (stream GenerateResponse) {}
}

message GenerateRequest {
  int32 count = 1;
}

message GenerateResponse {
  int32 id = 1;
  string name = 2;
  double value = 3;
  string timestamp = 4;
  string json_data = 5;
}
